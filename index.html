<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damion Torrez — Visual World Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --night: #0a0a0f;
  --twilight-deep: #1a1430;
  --twilight-mid: #2d1b4e;
  --twilight-light: #4a2c6b;
  --sunset-orange: #ff6b35;
  --sunset-pink: #ff8b94;
  --street-yellow: #f4d03f;
  --underground-brown: #2c1810;
  --dirt: #1a0f08;
  --offwhite: #f5f3f0;
  --gold: #d4af37;
  --building-dark: #1c1c1c;
  --window-glow: rgba(244, 208, 63, 0.6);
  --shadow: rgba(0,0,0,0.8);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--night);
  color: var(--offwhite);
  overflow-x: hidden;
  cursor: none;
}

/* CUSTOM CURSOR */
.cursor {
  position: fixed; width: 4px; height: 4px;
  background: var(--gold); border-radius: 50%;
  pointer-events: none; z-index: 10000;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, opacity 0.3s;
  mix-blend-mode: difference;
}

.cursor-trail {
  position: fixed; width: 20px; height: 20px;
  border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
}

/* MAIN SCROLL CONTAINER */
.world {
  position: relative;
  height: 800vh; /* 8x viewport height for long journey */
}

/* SKY LAYERS */
.sky-layer {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 100vh;
  z-index: 1;
  background: linear-gradient(
    to bottom,
    var(--night) 0%,
    var(--twilight-deep) 25%,
    var(--twilight-mid) 50%,
    var(--twilight-light) 75%,
    var(--sunset-pink) 90%,
    var(--sunset-orange) 100%
  );
  transition: opacity 0.3s ease;
}

.stars {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(2px 2px at 20% 30%, var(--offwhite), transparent),
    radial-gradient(1px 1px at 60% 20%, var(--gold), transparent),
    radial-gradient(1px 1px at 90% 40%, var(--offwhite), transparent),
    radial-gradient(2px 2px at 40% 70%, var(--gold), transparent),
    radial-gradient(1px 1px at 80% 10%, var(--offwhite), transparent),
    radial-gradient(1px 1px at 15% 80%, var(--gold), transparent);
  animation: twinkle 4s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* BUILDING STRUCTURE */
.building {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 120vh;
  z-index: 5;
  background: linear-gradient(
    to bottom,
    var(--building-dark) 0%,
    #252525  50%,
    var(--building-dark) 100%
  );
  box-shadow: 
    inset 2px 0 4px rgba(0,0,0,0.5),
    inset -2px 0 4px rgba(0,0,0,0.5),
    0 0 40px var(--shadow);
}

.building::before {
  content: '';
  position: absolute;
  top: 0; left: -2px; right: -2px;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 8vh,
    rgba(0,0,0,0.3) 8vh,
    rgba(0,0,0,0.3) 8.5vh
  );
}

/* WINDOW ROWS */
.window-row {
  position: absolute;
  left: 0; right: 0;
  height: 8vh;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  align-items: center;
}

.window {
  width: 80px; height: 60px;
  background: var(--night);
  border: 2px solid #333;
  position: relative;
  overflow: hidden;
  cursor: none;
  transition: all 0.4s ease;
}

.window:hover {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--window-glow);
  transform: scale(1.05);
}

.window-content {
  position: absolute;
  inset: 2px;
  background-size: cover;
  background-position: center;
  opacity: 0.7;
  transition: opacity 0.4s ease;
}

.window:hover .window-content {
  opacity: 1;
}

.window-glow {
  position: absolute;
  inset: -1px;
  background: linear-gradient(45deg, 
    transparent 30%, 
    var(--window-glow) 50%, 
    transparent 70%
  );
  opacity: 0;
  transition: opacity 0.4s ease;
}

.window:hover .window-glow {
  opacity: 0.3;
  animation: windowShimmer 2s ease infinite;
}

@keyframes windowShimmer {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.3; }
}

/* WINDOW CONTENT STYLING */
.logo-window { background: #000; }
.art-window { background: linear-gradient(135deg, #8b0000, #000); }
.photo-window { background: linear-gradient(135deg, #4a148c, #000); }
.horror-window { background: linear-gradient(135deg, #d32f2f, #000); }

/* FLYING CREATURES */
.creatures {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.crow, .bat {
  position: absolute;
  width: 20px;
  height: 20px;
  background: var(--night);
  border-radius: 50% 10px;
  animation: fly 15s linear infinite;
}

.crow {
  animation-duration: 20s;
  animation-delay: -2s;
}

.bat {
  animation-duration: 12s;
  animation-delay: -8s;
  transform: scale(0.7);
}

@keyframes fly {
  0% {
    left: -40px;
    top: 20vh;
    transform: rotate(0deg);
  }
  25% {
    left: 30%;
    top: 15vh;
    transform: rotate(-10deg);
  }
  50% {
    left: 70%;
    top: 25vh;
    transform: rotate(5deg);
  }
  75% {
    left: 40%;
    top: 10vh;
    transform: rotate(-5deg);
  }
  100% {
    left: 110%;
    top: 30vh;
    transform: rotate(0deg);
  }
}

/* STREET LEVEL */
.street {
  position: fixed;
  bottom: -50px;
  left: 0; right: 0;
  height: 200px;
  z-index: 4;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(40, 40, 40, 0.8) 40%,
    var(--underground-brown) 100%
  );
  transform: translateY(100vh);
  transition: transform 0.6s ease;
}

.street-lights {
  position: absolute;
  top: 20px;
  width: 100%;
  height: 60px;
}

.street-light {
  position: absolute;
  width: 3px;
  height: 50px;
  background: #333;
  top: 0;
}

.street-light::before {
  content: '';
  position: absolute;
  top: -10px;
  left: -8px;
  width: 20px;
  height: 20px;
  background: radial-gradient(circle, var(--street-yellow) 30%, transparent 70%);
  border-radius: 50%;
}

.street-light:nth-child(1) { left: 20%; }
.street-light:nth-child(2) { left: 40%; }
.street-light:nth-child(3) { left: 60%; }
.street-light:nth-child(4) { left: 80%; }

/* BLACK CROSS-EYED KITTEN */
.kitten {
  position: absolute;
  bottom: 80px;
  left: 10%;
  width: 40px;
  height: 30px;
  background: var(--night);
  border-radius: 50% 50% 60% 60%;
  animation: prowl 25s linear infinite;
  z-index: 6;
}

.kitten::before {
  content: '';
  position: absolute;
  top: 5px;
  left: 8px;
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 18px 0 var(--gold);
  animation: crossEyed 3s ease-in-out infinite;
}

.kitten::after {
  content: '';
  position: absolute;
  top: -8px;
  left: 12px;
  width: 8px;
  height: 8px;
  background: var(--night);
  border-radius: 80% 20% 20% 80%;
  box-shadow: 8px 0 var(--night);
}

@keyframes prowl {
  0%, 100% { left: -50px; transform: scaleX(1); }
  50% { left: calc(100% - 50px); transform: scaleX(-1); }
}

@keyframes crossEyed {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(-2px); }
}

/* UNDERGROUND LAYERS */
.underground {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  height: 100vh;
  z-index: 2;
  background: linear-gradient(
    to bottom,
    var(--underground-brown) 0%,
    var(--dirt) 100%
  );
  transform: translateY(100vh);
  transition: transform 0.6s ease;
}

.pipes {
  position: absolute;
  top: 20%;
  width: 100%;
  height: 200px;
}

.pipe {
  position: absolute;
  background: #666;
  border-radius: 10px;
}

.pipe:nth-child(1) {
  left: 10%;
  width: 30%;
  height: 20px;
  top: 20px;
}

.pipe:nth-child(2) {
  left: 60%;
  width: 25%;
  height: 15px;
  top: 60px;
}

.bugs {
  position: absolute;
  bottom: 10%;
  width: 100%;
  height: 100px;
}

.bug {
  position: absolute;
  width: 3px;
  height: 3px;
  background: var(--gold);
  border-radius: 50%;
  animation: crawl 10s linear infinite;
}

.bug:nth-child(1) { left: 20%; animation-delay: 0s; }
.bug:nth-child(2) { left: 50%; animation-delay: -3s; }
.bug:nth-child(3) { left: 70%; animation-delay: -6s; }

@keyframes crawl {
  0%, 100% { opacity: 0; transform: translate(0, 0); }
  25% { opacity: 1; transform: translate(30px, -10px); }
  50% { opacity: 1; transform: translate(-20px, 10px); }
  75% { opacity: 1; transform: translate(40px, 5px); }
}

/* NAVIGATION */
.nav {
  position: fixed;
  top: 40px;
  right: 40px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.nav-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--offwhite);
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid rgba(245, 243, 240, 0.2);
  transition: all 0.3s ease;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
}

.nav-item:hover {
  border-color: var(--gold);
  background: rgba(212, 175, 55, 0.1);
  transform: translateX(-5px);
}

/* INTRO OVERLAY */
.intro {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: var(--night);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 1;
  transition: opacity 1s ease;
}

.intro.hidden {
  opacity: 0;
  pointer-events: none;
}

.intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 600;
  margin-bottom: 24px;
  background: linear-gradient(135deg, var(--gold), var(--sunset-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.intro p {
  font-family: 'Inter', sans-serif;
  font-size: clamp(16px, 2vw, 24px);
  font-weight: 300;
  max-width: 600px;
  line-height: 1.6;
  color: rgba(245, 243, 240, 0.8);
  margin-bottom: 40px;
}

.intro-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--night);
  background: var(--gold);
  padding: 16px 32px;
  border: none;
  cursor: none;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.intro-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.intro-btn:hover::before {
  left: 100%;
}

.intro-btn:hover {
  background: var(--sunset-orange);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
}

/* CONTENT OVERLAY FOR INTERACTIONS */
.content-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(10, 10, 15, 0.95);
  z-index: 1500;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s ease;
  backdrop-filter: blur(10px);
}

.content-overlay.active {
  opacity: 1;
  visibility: visible;
}

.content-panel {
  background: var(--building-dark);
  border: 1px solid var(--gold);
  padding: 40px;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: var(--gold);
  font-size: 24px;
  cursor: none;
  transition: color 0.3s ease;
}

.close-btn:hover {
  color: var(--sunset-orange);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .building {
    width: 300px;
  }
  
  .window {
    width: 60px;
    height: 45px;
  }
  
  .nav {
    top: 20px;
    right: 20px;
    gap: 15px;
  }
}
</style>
</head>
<body>

<!-- INTRO OVERLAY -->
<div class="intro" id="intro">
  <h1>DAMION TORREZ</h1>
  <p>Enter the world where brands become landscapes, where stories unfold in layers, where every pixel has purpose and every shadow holds meaning.</p>
  <button class="intro-btn" onclick="enterWorld()">ENTER THE TOWER</button>
</div>

<!-- CUSTOM CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<!-- NAVIGATION -->
<nav class="nav">
  <a href="#sky" class="nav-item">VISIONS</a>
  <a href="#building" class="nav-item">WORKS</a>
  <a href="#street" class="nav-item">WORLDS</a>
  <a href="#underground" class="nav-item">DEPTHS</a>
</nav>

<!-- MAIN WORLD CONTAINER -->
<div class="world">

  <!-- SKY LAYER -->
  <div class="sky-layer" id="skyLayer">
    <div class="stars"></div>
  </div>

  <!-- BUILDING STRUCTURE -->
  <div class="building" id="building">
    
    <!-- WINDOW ROWS -->
    <div class="window-row" style="top: 10vh;">
      <div class="window logo-window" onclick="showContent('logo')">
        <div class="window-content" style="background-image: url('logo_1.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window logo-window" onclick="showContent('logo')">
        <div class="window-content" style="background-image: url('logo_9.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window logo-window" onclick="showContent('logo')">
        <div class="window-content" style="background-image: url('logo_5.png');"></div>
        <div class="window-glow"></div>
      </div>
    </div>

    <div class="window-row" style="top: 20vh;">
      <div class="window art-window" onclick="showContent('art')">
        <div class="window-content" style="background-image: url('art_6.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window art-window" onclick="showContent('art')">
        <div class="window-content" style="background-image: url('art_9.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window art-window" onclick="showContent('art')">
        <div class="window-content" style="background-image: url('art_7.jpg');"></div>
        <div class="window-glow"></div>
      </div>
    </div>

    <div class="window-row" style="top: 30vh;">
      <div class="window horror-window" onclick="showContent('horror')">
        <div class="window-content" style="background-image: url('horror_poster_2019.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window horror-window" onclick="showContent('horror')">
        <div class="window-content" style="background-image: url('horror_tickets.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window horror-window" onclick="showContent('horror')">
        <div class="window-content" style="background-image: url('horror_badge.png');"></div>
        <div class="window-glow"></div>
      </div>
    </div>

    <div class="window-row" style="top: 40vh;">
      <div class="window photo-window" onclick="showContent('photo')">
        <div class="window-content" style="background-image: url('mm_48.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window photo-window" onclick="showContent('photo')">
        <div class="window-content" style="background-image: url('mm_4.jpg');"></div>
        <div class="window-glow"></div>
      </div>
      <div class="window photo-window" onclick="showContent('photo')">
        <div class="window-content" style="background-image: url('mm_20.jpg');"></div>
        <div class="window-glow"></div>
      </div>
    </div>

    <div class="window-row" style="top: 50vh;">
      <div class="window logo-window" onclick="showContent('contact')">
        <div class="window-content" style="background: linear-gradient(45deg, var(--gold), var(--sunset-orange)); display: flex; align-items: center; justify-content: center; font-family: JetBrains Mono; font-size: 8px; color: var(--night); letter-spacing: 1px;">CONTACT</div>
        <div class="window-glow"></div>
      </div>
      <div class="window art-window" onclick="showContent('about')">
        <div class="window-content" style="background: linear-gradient(45deg, var(--twilight-mid), var(--sunset-pink)); display: flex; align-items: center; justify-content: center; font-family: JetBrains Mono; font-size: 10px; color: var(--offwhite); letter-spacing: 1px;">ABOUT</div>
        <div class="window-glow"></div>
      </div>
      <div class="window photo-window" onclick="showContent('process')">
        <div class="window-content" style="background: linear-gradient(45deg, var(--underground-brown), var(--dirt)); display: flex; align-items: center; justify-content: center; font-family: JetBrains Mono; font-size: 9px; color: var(--gold); letter-spacing: 1px;">PROCESS</div>
        <div class="window-glow"></div>
      </div>
    </div>

  </div>

  <!-- FLYING CREATURES -->
  <div class="creatures">
    <div class="crow"></div>
    <div class="crow" style="animation-delay: -10s; animation-duration: 25s;"></div>
    <div class="bat"></div>
    <div class="bat" style="animation-delay: -5s; animation-duration: 18s;"></div>
    <div class="crow" style="animation-delay: -15s; animation-duration: 22s;"></div>
  </div>

  <!-- STREET LEVEL -->
  <div class="street" id="street">
    <div class="street-lights">
      <div class="street-light"></div>
      <div class="street-light"></div>
      <div class="street-light"></div>
      <div class="street-light"></div>
    </div>
    
    <!-- BLACK CROSS-EYED KITTEN -->
    <div class="kitten"></div>
  </div>

  <!-- UNDERGROUND -->
  <div class="underground" id="underground">
    <div class="pipes">
      <div class="pipe"></div>
      <div class="pipe"></div>
    </div>
    <div class="bugs">
      <div class="bug"></div>
      <div class="bug"></div>
      <div class="bug"></div>
    </div>
  </div>

</div>

<!-- CONTENT OVERLAY -->
<div class="content-overlay" id="contentOverlay">
  <div class="content-panel" id="contentPanel">
    <button class="close-btn" onclick="hideContent()">&times;</button>
    <div id="overlayContent"></div>
  </div>
</div>

<script>
// Cursor tracking
const cursor = document.getElementById('cursor');
const cursorTrail = document.getElementById('cursorTrail');
let mouseX = 0, mouseY = 0;
let trailX = 0, trailY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
});

function animateTrail() {
  trailX += (mouseX - trailX) * 0.1;
  trailY += (mouseY - trailY) * 0.1;
  cursorTrail.style.left = trailX + 'px';
  cursorTrail.style.top = trailY + 'px';
  requestAnimationFrame(animateTrail);
}
animateTrail();

// Cursor hover effects
document.querySelectorAll('.window, .intro-btn, .nav-item, .close-btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '12px';
    cursor.style.height = '12px';
    cursorTrail.style.width = '40px';
    cursorTrail.style.height = '40px';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '4px';
    cursor.style.height = '4px';
    cursorTrail.style.width = '20px';
    cursorTrail.style.height = '20px';
  });
});

// Parallax scrolling and world transitions
window.addEventListener('scroll', () => {
  const scrolled = window.pageYOffset;
  const rate = scrolled * -0.5;
  const building = document.getElementById('building');
  const street = document.getElementById('street');
  const underground = document.getElementById('underground');
  
  // Building parallax
  building.style.transform = `translateX(-50%) translateY(${rate}px)`;
  
  // Sky transitions
  const skyLayer = document.getElementById('skyLayer');
  const skyOpacity = Math.max(0, 1 - scrolled / (window.innerHeight * 2));
  skyLayer.style.opacity = skyOpacity;
  
  // Street level appearance
  if (scrolled > window.innerHeight * 3) {
    street.style.transform = 'translateY(0)';
  } else {
    street.style.transform = 'translateY(100vh)';
  }
  
  // Underground appearance
  if (scrolled > window.innerHeight * 5) {
    underground.style.transform = 'translateY(0)';
  } else {
    underground.style.transform = 'translateY(100vh)';
  }
});

// Enter world function
function enterWorld() {
  document.getElementById('intro').classList.add('hidden');
  document.body.style.overflow = 'auto';
}

// Content overlay system
function showContent(type) {
  const overlay = document.getElementById('contentOverlay');
  const content = document.getElementById('overlayContent');
  
  const contentData = {
    logo: {
      title: 'Brand Identity & Logo Systems',

function hideContent() {
  document.getElementById('contentOverlay').classList.remove('active');
}

// Navigation scrolling
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    const target = e.target.getAttribute('href').substring(1);
    let scrollTarget = 0;
    
    switch(target) {
      case 'sky': scrollTarget = 0; break;
      case 'building': scrollTarget = window.innerHeight * 2; break;
      case 'street': scrollTarget = window.innerHeight * 4; break;
      case 'underground': scrollTarget = window.innerHeight * 6; break;
    }
    
    window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
  });
});

// Initialize
document.body.style.overflow = 'hidden';
